[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
pythonpath = .
markers =
    unit: Unit tests (no network)
    integration: Integration tests (require ANTHROPIC_API_KEY)
    security: Security-focused tests
